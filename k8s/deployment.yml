apiVersion: apps/v1
kind: Deployment
metadata:
  name: sip-calculator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sip-calculator
  template:
    metadata:
      labels:
        app: kubernetes-ci-cd-pipeline-main
    spec:
      containers:
        - name: kubernetes-ci-cd-pipeline-main
          image: <YOUR_DOCKERHUB_USERNAME>/kubernetes-ci-cd-pipeline-main:latest
          ports:
            - containerPort: 80