name: Deploy SIP Calculator with Kind (Zero Downtime)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 (Docker + Kind + K8s)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/Kubernetes-CI-CD-Pipeline-main

            echo "===== SYNC CODE ====="
            git fetch --all
            git reset --hard origin/main

            echo "===== FIX PERMISSIONS ====="
            sudo chown -R ec2-user:ec2-user .

            echo "===== BUILD DOCKER IMAGE ====="
            docker build -t kubernetes-ci-cd-pipeline-main:latest .

            echo "===== LOAD IMAGE INTO KIND ====="
            kind load docker-image kubernetes-ci-cd-pipeline-main:latest

            echo "===== DEPLOY TO KUBERNETES ====="
            kubectl apply -f k8s/

            echo "===== WAIT FOR ROLLOUT ====="
            kubectl rollout status deployment/sip-calculator

            echo "===== VERIFY ====="
            kubectl get pods
            kubectl get svc